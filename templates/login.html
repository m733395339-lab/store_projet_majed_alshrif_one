<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تسجيل الدخول - نظام إدارة المخزن</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1E3A5F 0%, #2980B9 50%, #1E3A5F 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-container {
    background: white;
    border-radius: 20px;
    padding: 50px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-area {
    text-align: center;
    margin-bottom: 35px;
  }
  .logo-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #1E3A5F, #2980B9);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 15px;
    box-shadow: 0 8px 25px rgba(30,58,95,0.3);
  }
  .logo-area h1 {
    color: #1E3A5F;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .logo-area p {
    color: #7f8c8d;
    font-size: 13px;
  }
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    color: #2c3e50;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: #95a5a6;
    pointer-events: none;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 13px 45px 13px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.3s;
    outline: none;
    direction: rtl;
    background: #f8f9fa;
  }
  input:focus {
    border-color: #2980B9;
    background: white;
    box-shadow: 0 0 0 4px rgba(41,128,185,0.1);
  }
  .toggle-pass {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #95a5a6;
    user-select: none;
  }
  .toggle-pass:hover { color: #2980B9; }
  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #1E3A5F, #2980B9);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
    letter-spacing: 1px;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(30,58,95,0.4);
  }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
  .error-msg {
    background: #ffeaea;
    color: #c0392b;
    border: 1px solid #f5c6cb;
    border-radius: 8px;
    padding: 12px 15px;
    font-size: 14px;
    margin-bottom: 15px;
    display: none;
    text-align: center;
  }
  .error-msg.show { display: block; animation: shake 0.4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .default-info {
    background: #e8f4fd;
    border: 1px solid #bee3f8;
    border-radius: 8px;
    padding: 12px 15px;
    font-size: 13px;
    color: #2980B9;
    text-align: center;
    margin-top: 20px;
  }
  .default-info strong { display: block; margin-bottom: 4px; }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-left: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 480px) {
    .login-container { padding: 35px 25px; }
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo-area">
    <div class="logo-icon">🏪</div>
    <h1>نظام إدارة المخزن</h1>
    <p>Warehouse Management System</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>اسم المستخدم</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
      </div>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
        <span class="toggle-pass" onclick="togglePass()">👁️</span>
      </div>
    </div>
    <button type="submit" class="btn-login" id="login-btn">
      🔑 تسجيل الدخول
    </button>
  </form>

  <div class="default-info">
    <strong>بيانات الدخول الافتراضية:</strong>
    المستخدم: <b>admin</b> &nbsp;|&nbsp; كلمة المرور: <b>admin123</b>
  </div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  btn.disabled = true;
  btn.innerHTML = 'جاري التحقق... <span class="spinner"></span>';
  errEl.classList.remove('show');

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      btn.innerHTML = '✅ جاري التحميل...';
      window.location.href = '/';
    } else {
      errEl.textContent = data.message || 'خطأ في تسجيل الدخول';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '🔑 تسجيل الدخول';
    }
  } catch(err) {
    errEl.textContent = 'تعذر الاتصال بالخادم. تأكد من تشغيل النظام.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '🔑 تسجيل الدخول';
  }
}

function togglePass() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// التحقق من الجلسة
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await res.json();
    if (data.logged_in) window.location.href = '/';
  } catch(e) {}
})();
</script>
</body>
</html>
